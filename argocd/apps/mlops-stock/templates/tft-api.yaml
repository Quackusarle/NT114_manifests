apiVersion: apps/v1
kind: Deployment
metadata:
  name: tft-api
  labels:
    app: tft-api
    {{- include "mlops-stock.labels" . | nindent 4 }}
spec:
{{- if not .Values.tftApi.autoscaling.enabled }}
  replicas: {{ .Values.tftApi.replicaCount }}
{{- end }}
  selector:
    matchLabels:
      app: tft-api
  template:
    metadata:
      labels:
        app: tft-api
    spec:
      serviceAccountName: {{ include "mlops-stock.serviceAccountName" . }}
      containers:
        - name: tft-api
          image: "{{ .Values.tftApi.image.repository }}:{{ .Values.tftApi.image.tag }}"
          imagePullPolicy: {{ .Values.tftApi.image.pullPolicy }}
          env:
            - name: MLFLOW_TRACKING_URI
              value: {{ .Values.mlflow.trackingUri | quote }}


          ports:
            - name: http
              containerPort: {{ .Values.tftApi.service.port }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.tftApi.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: tft-api
  labels:
    app: tft-api
    {{- include "mlops-stock.labels" . | nindent 4 }}
spec:
  type: {{ .Values.tftApi.service.type }}
  ports:
    - port: {{ .Values.tftApi.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: tft-api
