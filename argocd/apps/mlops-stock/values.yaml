serviceAccount:
  create: false
mlflow:
  trackingUri: "http://mlflow-svc.mlops-infra.svc.cluster.local:5000"
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
dataApi:
  replicaCount: 1
  image:
    repository: quackusarle/mlops-stock-data-api
    pullPolicy: Always
    tag: "latest"
  service:
    type: ClusterIP
    port: 8001
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
tftApi:
  replicaCount: 1
  image:
    repository: quackusarle/mlops-stock-tft-api
    pullPolicy: Always
    tag: "latest"
  service:
    type: ClusterIP
    port: 8002
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
lgbmApi:
  replicaCount: 1
  image:
    repository: quackusarle/mlops-stock-lgbm-api
    pullPolicy: Always
    tag: "latest"
  service:
    type: ClusterIP
    port: 8003
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
ensembleApi:
  replicaCount: 1
  image:
    repository: quackusarle/mlops-stock-ensemble-api
    pullPolicy: Always
    tag: "latest"
  redis:
    host: "mlops-stock-redis-master"
    port: 6379
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
dashboardUi:
  replicaCount: 1
  image:
    repository: quackusarle/mlops-stock-dashboard
    pullPolicy: Always
    tag: "sha-71063e4"
  service:
    type: ClusterIP
    port: 8081
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
ingress:
  enabled: true
  className: "alb"
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/group.name: "mlops-group"
  hosts:
    - host: "" # Empty host means catch-all
      paths:
        - path: /
          pathType: Prefix
          backend:
            serviceName: dashboard-ui
            servicePort: 8081
        - path: /api
          pathType: Prefix
          backend:
            serviceName: ensemble-api
            servicePort: 8080
