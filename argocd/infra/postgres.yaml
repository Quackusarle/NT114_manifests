apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-local
  namespace: argocd
  finalizers:
    - argocd.argoproj.io/finalizer
spec:
  project: default
  source:
    repoURL: registry-1.docker.io/bitnamicharts
    chart: postgresql
    targetRevision: "18.7.0"
    helm:
      valuesObject:
        fullnameOverride: postgres-svc
        auth:
          username: mlflow
          existingSecret: postgres-credentials
          database: mlflow
        primary:
          networkPolicy:
            enabled: false
          persistence:
            storageClass: ebs-sc
            size: 5Gi
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
  destination:
    server: https://kubernetes.default.svc
    namespace: mlops-infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
