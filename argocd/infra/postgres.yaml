apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-local
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: postgresql
    targetRevision: "18.5.24"
    helm:
      valuesObject:
        fullnameOverride: postgres-svc
        auth:
          username: mlflow
          existingSecret: postgres-credentials
          database: mlflow
        primary:
          persistence:
            storageClass: local-path
            size: 5Gi
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
  destination:
    server: https://kubernetes.default.svc
    namespace: mlops-infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
